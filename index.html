---
layout: default
title: 首页
---
<h2>最新文章</h2>
<ul class="post-list">
  {% raw %}{% for post in site.posts %}{% endraw %}
    <li>
      <a href="{% raw %}{{ post.url }}{% endraw %}">{% raw %}{{ post.title }}{% endraw %}</a>
      <span class="date">{% raw %}{{ post.date | date: "%Y-%m-%d" }}{% endraw %}</span>
    </li>
  {% raw %}{% endfor %}{% endraw %}
</ul>
